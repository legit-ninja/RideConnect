services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rideconnect
      POSTGRES_PASSWORD: rideconnect
      POSTGRES_DB: rideconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideconnect -d rideconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rideconnect:rideconnect@db:5432/rideconnect
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"   # needed for hot reload inside Docker on some hosts
    volumes:
      - ./frontend:/app
      - /app/node_modules       # keep container's node_modules, don't overwrite from host
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
