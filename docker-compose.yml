services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rideconnect
      POSTGRES_PASSWORD: rideconnect
      POSTGRES_DB: rideconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideconnect -d rideconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    profiles: ["docker-api"]
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      # Snap Docker often blocks container-to-container traffic; reach Postgres via host port map.
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://rideconnect:rideconnect@host.docker.internal:5432/rideconnect
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    command: sh -c "chmod +x scripts/wait-for-postgres.sh && scripts/wait-for-postgres.sh && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # Host network lets SSR reach API on localhost:8000 when API runs via `make dev-api`
    # (Snap Docker blocks container→host port forwarding on host.docker.internal).
    network_mode: host
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"   # needed for hot reload inside Docker on some hosts
    volumes:
      - ./frontend:/app
      - /app/node_modules       # keep container's node_modules, don't overwrite from host
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
